<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael's Grilled Food | Reservations</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--
    WHEN THIS PAGE IS WORKING:
    Students should see a heading and a clean form in the middle of the page.
    The form will NOT actually send data anywhere yet.
    It is only being used to practice HTML forms and CSS styling.
  -->

  <header class="site-header">
    <nav class="navbar">
      <h1 class="logo">Restaurant Name</h1>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="reservations.html">Reservations</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="page-banner">
      <div class="container">
        <h2>Reservations</h2>
        <p>Fill out the form below to request a table.</p>
      </div>
    </section>

    <!--
      FORM SECTION
      WHEN THIS SECTION IS WORKING:
      Students should see labeled input boxes with enough spacing between them.

      CHANGE NEEDED:
      Students should check that every label matches an input.
      W3Schools search:
      - HTML forms
      - HTML input types
      - HTML label
      - HTML textarea
      - HTML required
    -->
    <section class="content-section">
      <div class="container form-container">

        <form class="reservation-form" action="#" method="get">

          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>

            <!--
              CHANGE NEEDED:
              Keep type="email" here.
              Students should research why email is better than text.
              W3Schools search: HTML input email
            -->
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="date">Reservation Date</label>
              <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
              <label for="time">Reservation Time</label>
              <input type="time" id="time" name="time" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="guests">Number of Guests</label>

              <!--
                CHANGE NEEDED:
                Students should research min and max attributes.
                W3Schools search:
                - HTML input number
                - HTML min max
              -->
              <input id="guests" name="guests" min="1" max="12" placeholder="2" required>
            </div>

            <div class="form-group">
              <label for="occasion">Occasion</label>

              <!--
                CHANGE NEEDED:
                Students may add more options here.
                W3Schools search:
                - HTML select
                - HTML option
              -->
              <select id="occasion" name="occasion">
                <option value="">Select one</option>
                <option value="birthday">Birthday</option>
                <option value="anniversary">Anniversary</option>
                <option value="family">Family Dinner</option>
                <option value="date-night">Date Night</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="notes">Special Requests</label>
            <textarea id="notes" name="notes" rows="5" placeholder="Enter allergies, seating requests, or extra information"></textarea>
          </div>

          <button type="submit" class="btn">Submit Reservation</button>
        </form>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Michael's Grilled Food. All rights reserved.</p>
  </footer>

</body>
</html>
